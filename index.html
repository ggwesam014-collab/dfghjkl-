<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxia Platform</title>
    
    <link rel="manifest" id="manifest-link">

    <style>
        :root { --main-blue: #0078d4; --bg: #ffffff; --text: #333; }
        body.dark-mode { --bg: #1a1a1a; --text: #f5f5f5; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #header { background: var(--bg); height: 60px; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: fixed; width: 100%; z-index: 10; }
        #sidebar { background: var(--main-blue); width: 250px; height: 100%; position: fixed; left: 0; top: 0; padding-top: 80px; color: white; }
        
        .nav-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item:hover { background: rgba(0,0,0,0.1); }
        #admin-nav-item { display: none; background: #c0392b; font-weight: bold; }

        #content { margin-left: 250px; padding: 100px 40px; height: 100vh; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }

        .btn { background: #000; color: #fff; padding: 15px 35px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        
        #update-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

    <div id="update-overlay">
        <h1>Update Required!</h1>
        <p>Please download the latest version to continue using Bloxia.</p>
        <button class="btn" style="background:#27ae60" onclick="downloadData('update')">Download New Update</button>
    </div>

    <header id="header">
        <h1 id="title" ondblclick="unlockAdmin()" style="cursor:pointer">Bloxia</h1>
    </header>

    <nav id="sidebar">
        <div class="nav-item" onclick="showPage('home')">Home</div>
        <div class="nav-item" onclick="showPage('install')">Install</div>
        <div id="admin-nav-item" class="nav-item" onclick="showPage('admin')">Admin Panel</div>
        <div class="nav-item" onclick="showPage('settings')">Settings</div>
    </nav>

    <main id="content">
        <div id="home" class="page active">
            <h2>Welcome to Bloxia</h2>
            <p>The ultimate platform for gaming experiences and freedom.</p>
        </div>

        <div id="install" class="page">
            <h2 id="display-name">Bloxia Game</h2>
            <button class="btn" id="mainInstallBtn">Install Game & App Shortcut</button>
        </div>

        <div id="admin" class="page">
            <h2>Admin Panel</h2>
            <input type="text" id="cfg-name" placeholder="Game Name">
            <label>Game Folder:</label>
            <input type="file" id="cfg-folder" webkitdirectory directory multiple>
            <label>Update Folder:</label>
            <input type="file" id="cfg-update" webkitdirectory directory multiple>
            <label><input type="checkbox" id="cfg-force"> Force Update Screen</label>
            <button class="btn" style="background:#27ae60" onclick="saveToDatabase()">Save & Push Update</button>
        </div>

        <div id="settings" class="page">
            <h2>Settings</h2>
            <button class="btn" onclick="document.body.classList.toggle('dark-mode')">Toggle Dark/Light Mode</button>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        let deferredPrompt;
        let db;

        // Create Dynamic Manifest
        const manifest = {
            "name": "Bloxia",
            "short_name": "Bloxia",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#ffffff",
            "description": "Bloxia Gaming Platform",
            "icons": [{"src": "https://img.freepik.com/premium-vector/cube-logo-design-abstract-cube-logo-design_219523-224.jpg", "sizes": "512x512", "type": "image/jpeg"}]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(blob));

        // Database Setup
        const request = indexedDB.open("BloxiaDB", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("settings", { keyPath: "id" });
        };
        request.onsuccess = e => {
            db = e.target.result;
            loadConfig();
        };

        // UI Functions
        function unlockAdmin() {
            if (prompt("Password:") === "Ww102030") document.getElementById('admin-nav-item').style.display = 'block';
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function saveToDatabase() {
            const name = document.getElementById('cfg-name').value || "Bloxia";
            const force = document.getElementById('cfg-force').checked;
            const gameFiles = Array.from(document.getElementById('cfg-folder').files);
            const updateFiles = Array.from(document.getElementById('cfg-update').files);

            const transaction = db.transaction("settings", "readwrite");
            const store = transaction.objectStore("settings");
            store.put({ id: "config", name, force, gameFiles, updateFiles });
            alert("Updated Successfully! Permanent storage active.");
            location.reload();
        }

        async function loadConfig() {
            const transaction = db.transaction("settings", "readonly");
            const store = transaction.objectStore("settings");
            const req = store.get("config");
            req.onsuccess = () => {
                if (req.result) {
                    document.getElementById('display-name').innerText = req.result.name;
                    if (req.result.force) document.getElementById('update-overlay').style.display = 'flex';
                }
            };
        }

        async function downloadData(type) {
            const transaction = db.transaction("settings", "readonly");
            const store = transaction.objectStore("settings");
            const req = store.get("config");
            req.onsuccess = async () => {
                const data = req.result;
                if (!data) return alert("Admin: Select folders first!");
                
                const zip = new JSZip();
                const files = (type === 'game') ? data.gameFiles : data.updateFiles;
                files.forEach(f => zip.file(f.webkitRelativePath || f.name, f));
                
                const blob = await zip.generateAsync({type: "blob"});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = (type === 'game' ? data.name : "Update") + ".zip";
                a.click();
            };
        }

        // --- THE "FORCE" INSTALL PART ---
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log("Install prompt captured!");
        });

        document.getElementById('mainInstallBtn').onclick = async () => {
            // 1. Download files immediately
            await downloadData('game');

            // 2. Trigger the "Install App" popup
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') alert("Bloxia is now on your Desktop!");
                deferredPrompt = null;
            } else {
                alert("To add to Desktop: Check the top-right corner of your browser for the 'Install' icon.");
            }
        };

        // Service Worker (Critical for Install button to work)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
            `));
        }
    </script>
</body>
</html>
