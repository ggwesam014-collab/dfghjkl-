<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxia Platform</title>
    
    <link rel="manifest" href='data:application/json,{"name":"Bloxia","short_name":"Bloxia","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#0078d4","icons":[{"src":"https://img.freepik.com/premium-vector/cube-logo-design-abstract-cube-logo-design_219523-224.jpg","sizes":"512x512","type":"image/jpeg"}]}'>

    <style>
        :root { --main-blue: #0078d4; --bg: #ffffff; --text: #333; }
        body.dark-mode { --bg: #1a1a1a; --text: #f5f5f5; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #header { background: var(--bg); height: 60px; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: fixed; width: 100%; z-index: 10; }
        #sidebar { background: var(--main-blue); width: 250px; height: 100%; position: fixed; left: 0; top: 0; padding-top: 80px; color: white; }
        
        .nav-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item:hover { background: rgba(0,0,0,0.1); }
        #admin-nav-item { display: none; background: #c0392b; font-weight: bold; }

        #content { margin-left: 250px; padding: 100px 40px; height: 100vh; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }

        .btn { background: #000; color: #fff; padding: 15px 35px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        
        #update-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

    <div id="update-overlay">
        <h1>New Update Available!</h1>
        <p>You must download the latest version to continue.</p>
        <button class="btn" style="background:#27ae60" onclick="downloadData('update')">Download Update</button>
    </div>

    <header id="header">
        <h1 id="title" ondblclick="unlockAdmin()" style="cursor:pointer">Bloxia</h1>
    </header>

    <nav id="sidebar">
        <div class="nav-item" onclick="showPage('home')">Home</div>
        <div class="nav-item" onclick="showPage('install')">Install</div>
        <div id="admin-nav-item" class="nav-item" onclick="showPage('admin')">Admin Panel</div>
        <div class="nav-item" onclick="showPage('settings')">Settings</div>
    </nav>

    <main id="content">
        <div id="home" class="page active">
            <h2>Welcome to Bloxia</h2>
            <p>A platform with endless experiences and total freedom.</p>
        </div>

        <div id="install" class="page">
            <h2 id="display-name">Bloxia Game</h2>
            <p>Status: Ready to install</p>
            <button class="btn" id="mainInstallBtn">Install Game & Shortcut</button>
        </div>

        <div id="admin" class="page">
            <h2>Admin Control Panel</h2>
            <label>Game Name:</label>
            <input type="text" id="cfg-name" placeholder="Enter Game Name">
            
            <label>Select Game Folder:</label>
            <input type="file" id="cfg-folder" webkitdirectory directory multiple>
            
            <label>Select Update Folder:</label>
            <input type="file" id="cfg-update" webkitdirectory directory multiple>

            <label><input type="checkbox" id="cfg-force"> Enable Forced Update Screen</label>
            <button class="btn" style="background:#27ae60" onclick="saveToDatabase()">Save & Deploy to All Devices</button>
        </div>

        <div id="settings" class="page">
            <h2>Settings</h2>
            <button class="btn" onclick="document.body.classList.toggle('dark-mode')">Toggle Dark Mode</button>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        let deferredPrompt;
        let db;

        // Initialize Database
        const request = indexedDB.open("BloxiaData", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("store", { keyPath: "id" });
        };
        request.onsuccess = e => {
            db = e.target.result;
            loadConfig();
        };

        function unlockAdmin() {
            if (prompt("Enter Admin Password:") === "Ww102030") {
                document.getElementById('admin-nav-item').style.display = 'block';
                alert("Admin Access Granted.");
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function saveToDatabase() {
            const name = document.getElementById('cfg-name').value || "Bloxia";
            const force = document.getElementById('cfg-force').checked;
            const gameFiles = document.getElementById('cfg-folder').files;
            const updateFiles = document.getElementById('cfg-update').files;

            const transaction = db.transaction("store", "readwrite");
            const store = transaction.objectStore("store");
            
            store.put({ 
                id: "config", 
                name, 
                force, 
                gameFiles: Array.from(gameFiles), 
                updateFiles: Array.from(updateFiles) 
            });

            alert("Data saved permanently! Updates are now live.");
            location.reload();
        }

        async function loadConfig() {
            const transaction = db.transaction("store", "readonly");
            const store = transaction.objectStore("store");
            const req = store.get("config");
            req.onsuccess = () => {
                if (req.result) {
                    const data = req.result;
                    document.getElementById('display-name').innerText = data.name;
                    if (data.force) document.getElementById('update-overlay').style.display = 'flex';
                }
            };
        }

        async function downloadData(type) {
            const transaction = db.transaction("store", "readonly");
            const store = transaction.objectStore("store");
            const data = (await new Promise(r => store.get("config").onsuccess = e => r(e.target.result)));
            
            if (!data) return alert("No folders selected in Admin Panel!");

            const zip = new JSZip();
            const files = (type === 'game') ? data.gameFiles : data.updateFiles;

            for (let file of files) {
                zip.file(file.webkitRelativePath || file.name, file);
            }

            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = (type === 'game' ? data.name : "Update") + ".zip";
            link.click();
        }

        // Handle Installation Shortcut
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log("Shortcut ready to be created.");
        });

        document.getElementById('mainInstallBtn').onclick = async () => {
            await downloadData('game');
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
            }
        };

        // Service Worker for Update Sync
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));`));
        }
    </script>
</body>
</html>
